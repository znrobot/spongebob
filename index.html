<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="theme-color" content="#59c7d6" />
    <title>海绵宝宝和派大星抓水母</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app">
      <section class="game-shell" aria-label="海绵宝宝和派大星抓水母游戏">
        <header class="topbar">
          <div>
            <p class="eyebrow">Bikini Bottom Jelly Hunt</p>
            <h1>海绵宝宝和派大星抓水母</h1>
          </div>
          <button id="startButton" class="primary-button" type="button">开始游戏</button>
        </header>

        <div class="controls" aria-label="游戏设置">
          <fieldset class="control-group">
            <legend>游戏模式</legend>
            <label class="choice">
              <input type="radio" name="gameMode" value="single" checked />
              单人
            </label>
            <label class="choice">
              <input type="radio" name="gameMode" value="double" />
              双人联机
            </label>
          </fieldset>

          <fieldset class="control-group">
            <legend>选择角色</legend>
            <label class="choice">
              <input type="radio" name="player" value="spongebob" checked />
              <span class="swatch sponge"></span>
              海绵宝宝
            </label>
            <label class="choice">
              <input type="radio" name="player" value="patrick" />
              <span class="swatch patrick"></span>
              派大星
            </label>
          </fieldset>

          <label class="control-group time-control">
            <span>游戏时间</span>
            <input id="durationInput" type="number" min="20" max="300" step="10" value="60" />
            <span>秒</span>
          </label>

          <label class="control-group value-control">
            <span>初始生命值</span>
            <input id="initialHpInput" type="number" min="1" max="99" step="1" value="10" />
          </label>

          <label class="control-group bonus-control">
            <input id="opponentBonusInput" type="checkbox" />
            <span>抓到对方角色 +10 分</span>
          </label>

          <label class="control-group bonus-control">
            <input id="giantJellyInput" type="checkbox" />
            <span>最后 10 秒巨大水母，接触 10 下 +100 分</span>
          </label>

          <label class="control-group bonus-control">
            <input id="bossModeInput" type="checkbox" />
            <span>打爆巨大水母后进入 2 分钟 Boss 关卡</span>
          </label>
        </div>

        <div id="multiplayerPanel" class="multiplayer-panel" hidden>
          <div class="room-actions">
            <button id="createRoomButton" class="secondary-button" type="button">创建房间</button>
            <label class="room-code">
              <span>房间码</span>
              <input id="roomCodeInput" type="text" maxlength="80" autocomplete="off" autocapitalize="none" spellcheck="false" placeholder="输入房间码" />
            </label>
            <button id="copyRoomButton" class="secondary-button" type="button">复制房间码</button>
            <button id="joinRoomButton" class="secondary-button" type="button">加入房间</button>
            <button id="readyButton" class="secondary-button" type="button" disabled>我准备好了</button>
          </div>
          <p id="networkStatus" class="network-status">双人联机需要两台设备打开此网页：一人创建房间，另一人输入房间码加入。</p>
        </div>

        <div class="scoreboard" aria-live="polite">
          <article>
            <span class="name">海绵宝宝</span>
            <strong id="spongeScore">0</strong>
            <span id="spongeHp">生命 10</span>
          </article>
          <article class="timer-card">
            <span>剩余时间</span>
            <strong id="timer">60</strong>
            <span id="statusText">方向键或 WASD 移动，空格抓水母</span>
          </article>
          <article>
            <span class="name">派大星</span>
            <strong id="patrickScore">0</strong>
            <span id="patrickHp">生命 10</span>
          </article>
        </div>

        <canvas id="gameCanvas" width="960" height="540" aria-label="游戏画面"></canvas>

        <div class="touch-controls" aria-label="触屏操作">
          <div class="dpad" aria-label="移动方向">
            <button class="touch-button up" type="button" data-move="up" aria-label="向上">▲</button>
            <button class="touch-button left" type="button" data-move="left" aria-label="向左">◀</button>
            <button class="touch-button right" type="button" data-move="right" aria-label="向右">▶</button>
            <button class="touch-button down" type="button" data-move="down" aria-label="向下">▼</button>
          </div>
          <button id="touchCatchButton" class="catch-button" type="button" aria-label="抓捕">抓</button>
        </div>
      </section>
    </main>

    <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
    <script src="game.js"></script>
  </body>
</html>
